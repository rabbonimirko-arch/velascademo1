<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Agent Smart Presence</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui;
}

.stage {
  width:100vw;
  height:100vh;
  display:grid;
  place-items:center;
}

.frame {
  width:min(100vw, calc(100vh * 9 / 16));
  height:min(100vh, calc(100vw * 16 / 9));
  position:relative;
}

iframe {
  width:100%;
  height:100%;
  border:0;
}

.loading {
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  color:#fff;
  background:rgba(0,0,0,0.8);
  z-index:2;
}

/* overlay presenza */
.presenceOverlay {
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  background:rgba(0,0,0,0.6);
  z-index:3;
  font-size:18px;
  text-align:center;
  padding:20px;
  transition:opacity .4s;
}

.hidden {
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div class="stage">
  <div class="frame">

    <div class="loading" id="loading">Caricamento…</div>

    <div class="presenceOverlay" id="presence">
      Avvicinati per iniziare<br>
      L’assistente AI si attiverà automaticamente
    </div>

    <iframe
      id="agentFrame"
      allow="camera; microphone; autoplay"
      src="src="https://studio.d-id.com/agents/embed?id=v2_agt_TSs3J5qX""
    ></iframe>

  </div>
</div>

<script>
const frame = document.getElementById('agentFrame');
const loading = document.getElementById('loading');
const overlay = document.getElementById('presence');

frame.onload = () => loading.style.display = "none";

// ==========================
// 🎥 PRESENCE DETECTION
// ==========================
let video = document.createElement('video');
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');

let lastFrame = null;
let presenceDetected = false;

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
  video.srcObject = stream;
  video.play();
  detectMotion();
})
.catch(err => {
  console.log("Camera non disponibile", err);
});

// Motion detection semplice
function detectMotion() {
  canvas.width = 160;
  canvas.height = 120;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  let currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

  if (lastFrame) {
    let diff = 0;

    for (let i = 0; i < currentFrame.data.length; i += 4) {
      diff += Math.abs(currentFrame.data[i] - lastFrame.data[i]);
    }

    if (diff > 50000 && !presenceDetected) {
      presenceDetected = true;
      onPresenceDetected();
    }
  }

  lastFrame = currentFrame;
  requestAnimationFrame(detectMotion);
}

// ==========================
// 🚀 ACTION ON PRESENCE
// ==========================
function onPresenceDetected() {

  console.log("Presenza rilevata");

  // nascondi overlay
  overlay.classList.add("hidden");

  // simula interazione utente per sbloccare audio/video
  document.body.click();

  // prova fullscreen
  requestFullscreen();

  // OPTIONAL: refresh iframe per auto start sessione
  // (utile per D-ID che richiede user gesture)
  setTimeout(() => {
    frame.contentWindow.postMessage("start", "*");
  }, 1000);
}

// ==========================
// FULLSCREEN
// ==========================
function requestFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

// ==========================
// BLOCCA ZOOM
// ==========================
let lastTouchEnd = 0;
document.addEventListener('touchend', (event) => {
  const now = Date.now();
  if (now - lastTouchEnd <= 300) event.preventDefault();
  lastTouchEnd = now;
}, { passive:false });

</script>

</body>
</html>
